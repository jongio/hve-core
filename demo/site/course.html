<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Browser — HVE Core</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="page-header">
    <div class="container">
      <div class="logo"><span>HVE</span> Core Course</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="course.html" class="active">Course</a>
      </nav>
    </div>
  </header>

  <main class="container">

    <div class="progress-container" style="margin-top: 24px;">
      <div class="progress-header">
        <h3>Your Progress</h3>
        <span class="progress-text">0 / 20 completed (0%)</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 0%"></div>
      </div>
    </div>

    <div class="course-layout">

      <aside class="course-sidebar">
        <ul class="sidebar-nav" id="sidebar-nav">
          <!-- Rendered by app.js -->
        </ul>
      </aside>

      <div class="course-content" id="semester-sections">
        <!-- Rendered by app.js -->
      </div>

    </div>

  </main>

  <footer class="page-footer">
    <div class="container">
      <p>HVE Core Course · Built with GitHub Copilot</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
